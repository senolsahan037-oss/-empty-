name: Build Windows Standalone

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Download and Extract ONNX Runtime
      shell: bash
      run: |
        mkdir -p _deps
        curl -L -o onnxruntime.zip "https://github.com/microsoft/onnxruntime/releases/download/v1.18.0/onnxruntime-win-x64-1.18.0.zip"
        unzip -q -o onnxruntime.zip -d _deps
        cp -r _deps/onnxruntime-win-x64-1.18.0/* _deps/onnxruntime/

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build Project
      run: cmake --build build --config Release

    - name: Bundle VC++ Runtime DLLs
      shell: bash
      run: |
        cp /c/Windows/System32/msvcp140.dll build/SubverseSplitter_artefacts/Release/Standalone/
        cp /c/Windows/System32/vcruntime140.dll build/SubverseSplitter_artefacts/Release/Standalone/
        cp /c/Windows/System32/vcruntime140_1.dll build/SubverseSplitter_artefacts/Release/Standalone/
        cp /c/Windows/System32/msvcp140.dll build/SubverseSplitter_artefacts/Release/VST3/SubverseLabSplitter.vst3/Contents/x86_64-win/
        cp /c/Windows/System32/vcruntime140.dll build/SubverseSplitter_artefacts/Release/VST3/SubverseLabSplitter.vst3/Contents/x86_64-win/
        cp /c/Windows/System32/vcruntime140_1.dll build/SubverseSplitter_artefacts/Release/VST3/SubverseLabSplitter.vst3/Contents/x86_64-win/

    - name: Upload Windows Executable and VST3
      uses: actions/upload-artifact@v4
      with:
        name: SubverseLabSplitter-Windows
        path: build/SubverseSplitter_artefacts/Release/
